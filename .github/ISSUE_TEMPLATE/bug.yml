name: Bug report
description: Report a reproducible problem in DropLoop.
title: "[Bug] "
labels: []
body:
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Describe who is blocked and how severe the failure is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the smallest deterministic reproduction.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs and evidence
      description: Add sanitized logs, screenshots, job IDs, and environment details.
  - type: textarea
    id: verification
    attributes:
      label: Fix verification
      description: Define the regression test or manual check required.
